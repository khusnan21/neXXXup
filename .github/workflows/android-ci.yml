name: Android Release

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout project
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Generate debug.keystore
      run: |
        mkdir -p ~/.android
        if [ -f "debug.keystore.base64" ]; then
          echo "Decoding debug.keystore.base64 to root and ~/.android/..."
          base64 -d debug.keystore.base64 > debug.keystore
          cp debug.keystore ~/.android/debug.keystore
        elif [ -n "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" ]; then
          echo "Decoding DEBUG_KEYSTORE_BASE64 secret to root and ~/.android/..."
          echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 --decode > debug.keystore
          cp debug.keystore ~/.android/debug.keystore
        else
          echo "Generating new debug.keystore using keytool..."
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          cp debug.keystore ~/.android/debug.keystore
        fi

    - name: Build with Gradle
      run: ./gradlew assembleStableDebug

    - name: Rename APK
      run: |
        mv app/build/outputs/apk/stable/debug/app-stable-debug.apk app/build/outputs/apk/stable/debug/neXXXup-4.7.0.apk

    - name: Upload APK to Release
      if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
      uses: ncipollo/release-action@v1
      with:
        artifacts: "app/build/outputs/apk/stable/debug/neXXXup-4.7.0.apk"
        tag: "latest"
        name: "neXXXup 4.7.0"
        body: "Latest build of neXXXup."
        allowUpdates: true
        replacesArtifacts: true
        token: ${{ secrets.GITHUB_TOKEN }}
